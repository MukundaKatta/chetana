<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chetana</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #0a0a0a;
    color: #fafafa;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body { display: flex; flex-direction: column; min-height: 100vh; padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom); }
  main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; gap: 24px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: #a855f7; box-shadow: 0 0 24px rgba(168, 85, 247, 0.6); }
  h1 { font-size: 48px; font-weight: 800; letter-spacing: -0.03em; margin: 0; }
  .tag { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; color: #a855f7; margin-bottom: -8px; }
  p { font-size: 17px; line-height: 1.5; color: #a3a3a3; margin: 0; max-width: 320px; }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #fafafa;
    color: #0a0a0a;
    padding: 16px 28px;
    border-radius: 999px;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    border: none;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .cta:active { transform: scale(0.98); }
  .sub { font-size: 13px; color: #525252; margin-top: -12px; }
  footer { text-align: center; font-size: 12px; color: #525252; padding: 24px 0 8px; }
  .loading { display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 12px; opacity: 0; transition: opacity 0.2s; }
  .loading.visible { opacity: 1; }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: #a855f7; animation: pulse 1.2s infinite ease-in-out; }
  .pulse:nth-child(2) { animation-delay: 0.2s; }
  .pulse:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>
  <main>
    <div class="dot"></div>
    <div>
      <div class="tag">AI consciousness research</div>
      <h1>Chetana</h1>
    </div>
    <p>Test AI models against 14 consciousness indicators from 6 scientific theories.</p>
    <button class="cta" id="open-app">
      Launch Chetana
      <span>&rarr;</span>
    </button>
    <p class="sub">Requires an internet connection.</p>
    <div class="loading" id="loading">
      <span class="pulse"></span>
      <span class="pulse"></span>
      <span class="pulse"></span>
    </div>
  </main>
  <footer>Chetana &middot; by Officethree Technologies</footer>

<script>
  (function () {
    var APP_URL = 'https://chetana.vercel.app';
    var btn = document.getElementById('open-app');
    var loading = document.getElementById('loading');

    function openApp() {
      loading.classList.add('visible');
      var controller = new AbortController();
      var timeoutId = setTimeout(function () { controller.abort(); }, 4000);
      fetch(APP_URL, { method: 'HEAD', mode: 'no-cors', signal: controller.signal })
        .then(function () {
          clearTimeout(timeoutId);
          window.location.href = APP_URL;
        })
        .catch(function () {
          clearTimeout(timeoutId);
          loading.classList.remove('visible');
          alert('Chetana needs an internet connection. Please check your network and try again.');
        });
    }

    btn.addEventListener('click', openApp);
  })();
</script>
</body>
</html>
